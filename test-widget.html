<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget テスト</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 40px; line-height: 2; }
  h1 { margin-bottom: 20px; }
  .spacer { height: 200vh; background: linear-gradient(to bottom, #e0f2fe, #fef3c7); padding: 40px; }
  .controls { position: fixed; top: 10px; left: 10px; background: #1f2937; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 13px; z-index: 999; }
  .controls button { margin-top: 8px; padding: 6px 12px; border: none; border-radius: 4px; background: #ef4444; color: #fff; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>
<div class="controls">
  <div>Scroll or wait 3s to trigger popup</div>
  <button onclick="localStorage.clear(); location.reload();">Reset localStorage</button>
</div>

<h1>LP Widget テストページ</h1>
<div class="spacer">
  <p>スクロールするか、3秒待つとポップアップが表示されます。</p>
  <p>（テスト用に scrollPercent=30, dwellSeconds=3, operator=OR に設定）</p>
</div>

<script>
  window.NpsWidget = {
    endpoint: "http://localhost:8787",
    triggers: {
      scrollPercent: 30,
      dwellSeconds: 3,
      operator: "OR"
    },
    display: {
      cooldownDays: 0,
      maxShowCount: 100,
      position: "bottom-right",
      delay: 0
    }
  };
</script>
<script src="http://localhost:8787/nps/widget.js"></script>
</body>
</html>
